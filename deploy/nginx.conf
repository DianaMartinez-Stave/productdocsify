# docs-dev.stavecorp.com — nginx server block
#
# Serves the docsify static site AND enforces Entra ID SSO on /employee/ via
# oauth2-proxy (auth_request). Everything else (landing, /client/, assets) is public.
#
# Deploy: place this under /etc/nginx/sites-available/, symlink into sites-enabled/,
# then `nginx -t && systemctl reload nginx`. certbot manages the ssl_certificate lines.

server {
    listen 443 ssl http2;
    server_name docs-dev.stavecorp.com;

    root /var/www/docs/productdocsify;
    index index.html;

    # ssl_certificate     /etc/letsencrypt/live/docs-dev.stavecorp.com/fullchain.pem;  # managed by certbot
    # ssl_certificate_key /etc/letsencrypt/live/docs-dev.stavecorp.com/privkey.pem;    # managed by certbot

    # --- oauth2-proxy endpoints (sign_in, callback, start, userinfo) ---
    location /oauth2/ {
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host                     $host;
        proxy_set_header X-Real-IP                $remote_addr;
        proxy_set_header X-Scheme                 $scheme;
        proxy_set_header X-Auth-Request-Redirect  $request_uri;
    }

    # --- the internal auth check used by auth_request below ---
    location = /oauth2/auth {
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host                     $host;
        proxy_set_header X-Real-IP                $remote_addr;
        proxy_set_header X-Auth-Request-Redirect  $request_uri;
        # nginx auth_request must not forward the request body / length
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # --- Protected internal docs ---
    # Gates both the full-page /employee/index.html load AND every real .md fetch
    # (GET /employee/**/README.md). Docsify hash routes (#/employee/...) never reach
    # the server, so protecting the actual file paths here is what makes it real.
    location ^~ /employee/ {
        auth_request /oauth2/auth;
        error_page 401 = @sign_in;
        try_files $uri $uri/ /employee/index.html;
    }

    location @sign_in {
        return 302 /oauth2/start?rd=$scheme://$host$request_uri;
    }

    # --- Everything else is public (landing, /client/, favicon, assets) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Optional: redirect plain HTTP to HTTPS (certbot usually adds this).
server {
    listen 80;
    server_name docs-dev.stavecorp.com;
    return 301 https://$host$request_uri;
}
